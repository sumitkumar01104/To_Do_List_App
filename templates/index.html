<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StudyTask</title>
  <link rel="icon" href="data:,">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --primary: #f55a00;
      --accent:  #03fdbe;
      --success: #095fff;
      --warn:    #ffb300;
      --bg:      #00001a;
      --card:    #13132b;
      --card2:   #1a1a35;
      --border:  rgba(91,79,255,0.22);
      --text:    #e8e8ff;
      --muted:   #00c3ff;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); font-family: 'DM Sans', sans-serif; color: var(--text); min-height: 100vh; }

    #blobs { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .blob { position: absolute; border-radius: 50%; filter: blur(90px); opacity: 0.12; animation: blobFloat 10s ease-in-out infinite alternate; }
    .blob1 { width:520px; height:520px; background:var(--primary); top:-180px; left:-160px; }
    .blob2 { width:400px; height:400px; background:var(--accent);  bottom:-120px; right:-120px; animation-delay:-5s; }
    @keyframes blobFloat { from{transform:translate(0,0) scale(1);} to{transform:translate(30px,40px) scale(1.08);} }

     .view { display: none; position: fixed; inset: 0; overflow-y: auto; z-index: 1; }
     .view.active { display: block; animation: fadeUp 0.35s ease; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(12px);} to{opacity:1;transform:translateY(0);} }

    /* AUTH */
    #authView { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:1rem; }
    .auth-wrap { width:100%; max-width:430px; }
    .brand { text-align:center; margin-bottom:2.2rem; }
    .brand h1 { font-family:'Syne',sans-serif; font-size:2.2rem; font-weight:800; letter-spacing:-1px; }
    .brand h1 span { color:var(--primary); }
    .brand p { color:var(--muted); font-size:0.84rem; margin-top:0.3rem; }
    .auth-card { background:var(--card); border:1px solid var(--border); border-radius:22px; padding:2rem; box-shadow:0 24px 60px rgba(0,0,0,0.55); }
    .tab-btns { display:flex; background:rgba(255,255,255,0.04); border-radius:12px; padding:4px; margin-bottom:1.8rem; }
    .tab-btns button { flex:1; border:none; background:transparent; color:var(--muted); font-family:'Syne',sans-serif; font-weight:700; font-size:0.9rem; padding:0.55rem 0; border-radius:9px; cursor:pointer; transition:all 0.25s; }
    .tab-btns button.active { background:var(--primary); color:#fff; box-shadow:0 4px 18px rgba(91,79,255,0.4); }
    .panel { display:none; }
    .panel.active { display:block; animation:fadeUp 0.25s; }

    .form-label { color:var(--muted); font-size:0.78rem; text-transform:uppercase; letter-spacing:0.4px; margin-bottom:0.35rem; display:block; }
    .form-control, .form-select { background:rgba(255,255,255,0.04); border:1px solid var(--border); color:var(--text); border-radius:10px; padding:0.65rem 1rem; font-family:'DM Sans',sans-serif; font-size:0.9rem; width:100%; transition:border-color 0.2s,box-shadow 0.2s; }
    .form-control:focus,.form-select:focus { background:rgba(91,79,255,0.07); border-color:var(--primary); box-shadow:0 0 0 3px rgba(91,79,255,0.18); color:var(--text); outline:none; }
    .form-control::placeholder { color:#44446a; }
    .form-select option { background:#1a1a35; }

    .btn-primary-full { width:100%; background:var(--primary); border:none; color:#fff; font-family:'Syne',sans-serif; font-weight:700; font-size:0.95rem; padding:0.75rem; border-radius:12px; cursor:pointer; margin-top:1.2rem; transition:all 0.2s; box-shadow:0 4px 20px rgba(91,79,255,0.35); }
    .btn-primary-full:hover { background:#7066ff; transform:translateY(-1px); }
    .btn-primary-full:disabled { opacity:0.6; cursor:not-allowed; transform:none; }
    .btn-primary-full .spinner { display:none; width:18px; height:18px; border:2px solid rgba(255,255,255,0.3); border-top-color:#fff; border-radius:50%; animation:spin 0.7s linear infinite; margin:0 auto; }
    .btn-primary-full.loading .btn-text { display:none; }
    .btn-primary-full.loading .spinner { display:block; }
    @keyframes spin { to{transform:rotate(360deg);} }

    .alert-msg { border-radius:10px; font-size:0.84rem; padding:0.65rem 1rem; margin-top:0.9rem; display:none; }
    .alert-msg.show { display:block; animation:fadeUp 0.2s; }
    .alert-err { background:rgba(255,107,107,0.12); border:1px solid rgba(255,107,107,0.28); color:#ff9999; }
    .alert-ok  { background:rgba(0,230,130,0.09);  border:1px solid rgba(0,230,130,0.28);   color:#00e682; }

    /* APP */
    #appView { min-height:100vh; background: var(--bg); }
    .navbar-custom { background:rgba(13,13,26,0.94); backdrop-filter:blur(14px); border-bottom:1px solid var(--border); padding:0.85rem 1.5rem; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
    .nav-brand { font-family:'Syne',sans-serif; font-weight:800; font-size:1.35rem; letter-spacing:-0.5px; }
    .nav-brand span { color:var(--primary); }
    .nav-right { display:flex; align-items:center; gap:0.8rem; }
    .user-chip { background:rgba(91,79,255,0.13); border:1px solid var(--border); border-radius:8px; padding:0.28rem 0.75rem; font-size:0.8rem; color:var(--muted); }
    .user-chip b { color:var(--primary); }
    .btn-logout { background:transparent; border:1px solid rgba(255,107,107,0.28); color:var(--accent); font-size:0.8rem; padding:0.28rem 0.75rem; border-radius:8px; cursor:pointer; transition:all 0.2s; font-family:'DM Sans',sans-serif; }
    .btn-logout:hover { background:rgba(255,107,107,0.1); }

    .app-body { max-width:760px; margin:2rem auto; padding:0 1rem; }

    .stats-row { display:grid; grid-template-columns:repeat(3,1fr); gap:0.9rem; margin-bottom:1.8rem; }
    .stat-card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:0.9rem 1rem; text-align:center; }
    .stat-card .num { font-family:'Syne',sans-serif; font-size:1.75rem; font-weight:800; }
    .stat-card .lbl { color:var(--muted); font-size:0.72rem; text-transform:uppercase; letter-spacing:0.5px; }
    .c-total{color:var(--primary);} .c-pending{color:var(--warn);} .c-done{color:var(--success);}

    .add-card { background:var(--card); border:1px solid var(--border); border-radius:18px; padding:1.4rem; margin-bottom:1.4rem; }
    .section-title { font-family:'Syne',sans-serif; font-size:0.85rem; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:1rem; }
    .row-gap { display:flex; gap:0.6rem; flex-wrap:wrap; }
    .row-gap > * { flex:1; min-width:140px; }
    .subtask-row { display:flex; gap:0.5rem; margin-top:0.5rem; }
    .subtask-row input { flex:1; }
    .btn-plus { background:rgba(91,79,255,0.18); border:1px solid var(--border); color:var(--primary); border-radius:10px; padding:0.4rem 0.85rem; cursor:pointer; font-size:1.1rem; line-height:1; transition:background 0.2s; }
    .btn-plus:hover { background:rgba(91,79,255,0.32); }
    .chips-wrap { display:flex; flex-wrap:wrap; gap:0.4rem; margin-top:0.5rem; }
    .chip { background:rgba(91,79,255,0.1); border:1px solid var(--border); border-radius:6px; padding:0.2rem 0.55rem; font-size:0.76rem; color:var(--text); display:flex; align-items:center; gap:0.35rem; }
    .chip button { background:none; border:none; color:var(--accent); cursor:pointer; font-size:0.76rem; line-height:1; padding:0; }
    .btn-save { background:var(--primary); border:none; color:#fff; font-family:'Syne',sans-serif; font-weight:700; padding:0.58rem 1.4rem; border-radius:10px; cursor:pointer; font-size:0.9rem; margin-top:0.9rem; transition:all 0.2s; box-shadow:0 4px 14px rgba(91,79,255,0.3); }
    .btn-save:hover { background:#7066ff; transform:translateY(-1px); }

    .filter-bar { display:flex; gap:0.45rem; margin-bottom:1rem; flex-wrap:wrap; }
    .f-btn { background:var(--card); border:1px solid var(--border); color:var(--muted); border-radius:8px; padding:0.32rem 0.85rem; font-size:0.82rem; cursor:pointer; transition:all 0.18s; font-family:'DM Sans',sans-serif; }
    .f-btn.active,.f-btn:hover { background:var(--primary); border-color:var(--primary); color:#fff; }

    .task-list { display:flex; flex-direction:column; gap:0.75rem; }
    .task-card { background:var(--card); border:1px solid var(--border); border-radius:14px; overflow:hidden; transition:transform 0.15s,box-shadow 0.15s; animation:fadeUp 0.25s; }
    .task-card:hover { transform:translateY(-1px); box-shadow:0 8px 28px rgba(0,0,0,0.3); }
    .task-card.is-done { opacity:0.58; }

    .task-top { display:flex; align-items:center; gap:0.75rem; padding:0.9rem 1.1rem; }
    .t-check { width:20px; height:20px; flex-shrink:0; border:2px solid var(--border); border-radius:6px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.2s; }
    .t-check.on { background:var(--success); border-color:var(--success); }
    .t-check.on::after { content:'✓'; color:#0d0d1a; font-size:0.72rem; font-weight:900; }
    .t-info { flex:1; min-width:0; }
    .t-title { font-weight:500; font-size:0.93rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .t-title.done-text { text-decoration:line-through; color:var(--muted); }
    .t-meta { display:flex; align-items:center; gap:0.45rem; margin-top:0.2rem; flex-wrap:wrap; }
    .badge-sub { background:rgba(91,79,255,0.14); border:1px solid rgba(91,79,255,0.22); color:#a89dff; font-size:0.68rem; padding:0.08rem 0.48rem; border-radius:5px; }
    .badge-due { color:var(--muted); font-size:0.7rem; }
    .badge-due.over { color:var(--accent); }
    .t-actions { display:flex; gap:0.35rem; }
    .t-btn { background:rgba(255,255,255,0.05); border:1px solid var(--border); border-radius:7px; padding:0.28rem 0.5rem; cursor:pointer; font-size:0.78rem; color:var(--muted); transition:all 0.18s; line-height:1; }
    .t-btn:hover { background:rgba(255,107,107,0.1); border-color:var(--accent); color:var(--accent); }
    .t-btn.expand { color:var(--primary); }
    .t-btn.expand:hover { background:rgba(91,79,255,0.14); border-color:var(--primary); color:var(--primary); }

    .prog-wrap { padding:0 1.1rem 0.6rem; }
    .prog-label { font-size:0.7rem; color:var(--muted); margin-bottom:0.28rem; }
    .prog-bg { background:rgba(255,255,255,0.06); border-radius:4px; height:5px; overflow:hidden; }
    .prog-fill { height:100%; background:var(--primary); border-radius:4px; transition:width 0.4s; }

    .sub-area { border-top:1px solid var(--border); background:var(--card2); padding:0.8rem 1.1rem 0.9rem; display:none; }
    .sub-area.open { display:block; animation:fadeUp 0.2s; }
    .sub-area h6 { font-size:0.72rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:0.55rem; }
    .sub-item { display:flex; align-items:center; gap:0.55rem; padding:0.32rem 0; border-bottom:1px solid rgba(255,255,255,0.04); }
    .sub-item:last-of-type { border-bottom:none; }
    .s-check { width:15px; height:15px; flex-shrink:0; border:1.5px solid var(--border); border-radius:4px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.2s; }
    .s-check.on { background:var(--success); border-color:var(--success); }
    .s-check.on::after { content:'✓'; font-size:0.58rem; color:#0d0d1a; font-weight:900; }
    .s-title { font-size:0.83rem; flex:1; }
    .s-title.done-text { text-decoration:line-through; color:var(--muted); }
    .btn-del-sub { background:none; border:none; color:#44446a; cursor:pointer; font-size:0.72rem; transition:color 0.18s; }
    .btn-del-sub:hover { color:var(--accent); }
    .sub-add-row { display:flex; gap:0.4rem; margin-top:0.6rem; }
    .sub-add-row input { flex:1; font-size:0.82rem !important; padding:0.38rem 0.7rem !important; }

    .empty-state { text-align:center; padding:3rem; color:var(--muted); }
    .empty-state .ico { font-size:2.8rem; margin-bottom:0.8rem; }
    .empty-state p { font-size:0.88rem; }
    .loading-msg { text-align:center; padding:2rem; color:var(--muted); font-size:0.88rem; }

    .toast-wrap { position:fixed; bottom:1.4rem; right:1.4rem; z-index:9999; display:flex; flex-direction:column; gap:0.45rem; }
    .toast-item { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:0.65rem 1.1rem; font-size:0.83rem; box-shadow:0 8px 28px rgba(0,0,0,0.42); animation:slideIn 0.28s, fadeOut 0.3s 2.4s forwards; }
    .toast-item.ok  { border-color:rgba(0,230,130,0.3);  color:var(--success); }
    .toast-item.err { border-color:rgba(255,107,107,0.3); color:var(--accent); }
    @keyframes slideIn { from{transform:translateX(18px);opacity:0;} to{transform:translateX(0);opacity:1;} }
    @keyframes fadeOut { to{opacity:0;transform:translateY(5px);} }
  </style>
</head>
<body>

<div id="blobs"><div class="blob blob1"></div><div class="blob blob2"></div></div>

<!-- ══ AUTH VIEW ══ -->
<div id="authView" class="view active">
  <div class="auth-wrap">
    <div class="brand">
      <h1>Study<span>Task</span></h1>
      <p>Students Task Manager</p>
    </div>
    <div class="auth-card">
      <div class="tab-btns">
        <button class="active" onclick="switchTab('login')">Login</button>
        <button onclick="switchTab('register')">Register</button>
      </div>
      <!-- LOGIN -->
      <div class="panel active" id="loginPanel">
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input type="text" class="form-control" id="lUser" placeholder="username likho"/>
        </div>
        <div class="mb-1">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" id="lPass" placeholder="••••••••"/>
        </div>
        <div class="alert-msg alert-err" id="lErr"></div>
        <button class="btn-primary-full" id="lBtn" onclick="doLogin()">
          <span class="btn-text">Login</span><div class="spinner"></div>
        </button>
      </div>
      <!-- REGISTER -->
       
      <div class="panel" id="registerPanel">
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input type="text" class="form-control" id="rUser" placeholder="username"/>
        </div>
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" id="rEmail" placeholder="email@example.com"/>
        </div>
        <div class="mb-1">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" id="rPass" placeholder="strong password"/>
        </div>
        <div class="alert-msg alert-err" id="rErr"></div>
        <div class="alert-msg alert-ok"  id="rOk"></div>
        <button class="btn-primary-full" id="rBtn" onclick="doRegister()">
          <span class="btn-text">Create Account</span><div class="spinner"></div>
        </button>
      </div>
    </div>
  </div>
</div>

<!-- ══ APP VIEW ══ -->
<div id="appView" class="view">
  <div class="navbar-custom">
    <div class="nav-brand">Study<span>Task</span></div>
    <div class="nav-right">
      <div class="user-chip">👋 <b id="navUser">Student</b></div>
      <button class="btn-logout" onclick="doLogout()">Logout</button>
    </div>
  </div>
  <div class="app-body">
    <div class="stats-row">
      <div class="stat-card"><div class="num c-total"   id="sTotal">0</div><div class="lbl">Total</div></div>
      <div class="stat-card"><div class="num c-pending" id="sPend">0</div><div class="lbl">Pending</div></div>
      <div class="stat-card"><div class="num c-done"    id="sDone">0</div><div class="lbl">Done</div></div>
    </div>
    <div class="add-card">
      <div class="section-title">➕ New Task</div>
      <div class="mb-2">
        <label class="form-label">Task Name</label>
        <input type="text" class="form-control" id="tTitle" placeholder="Add Your Task"/>
      </div>
      <div class="row-gap mb-2">
        <div>
          <label class="form-label">Subject</label>
          <input type="text" class="form-control" id="tSubject" placeholder="Math, Physics..."/>
        </div>
        <div>
          <label class="form-label">Due Date</label>
          <input type="date" class="form-control" id="tDue"/>
        </div>
      </div>
      <div>
        <label class="form-label">Subtasks</label>
        <div class="subtask-row">
          <input type="text" class="form-control" id="subInp" placeholder="write one subtask..."/>
          <button class="btn-plus" onclick="addChip()">+</button>
        </div>
        <div class="chips-wrap" id="chipsWrap"></div>
      </div>
      <button class="btn-save" onclick="addTask()">Save Task</button>
    </div>
    <div class="filter-bar">
      <button class="f-btn active" onclick="setFilter('all',this)">All</button>
      <button class="f-btn" onclick="setFilter('pending',this)">Pending</button>
      <button class="f-btn" onclick="setFilter('done',this)">Done</button>
    </div>
    <div class="loading-msg" id="loadMsg">Loding...</div>
    <div class="task-list" id="taskList"></div>
    <div class="empty-state" id="emptyMsg" style="display:none">
      <div class="ico">📚</div>
      <p>No Task Found ! Plz Add Task First...</p>
    </div>
  </div>
</div>

<div class="toast-wrap" id="toastWrap"></div>

<script>
// ─────────────────────────────────────
//  ⚙️  change Your Django Api 
// ─────────────────────────────────────
const API       = 'http://127.0.0.1:8000/api';
const URL_LOGIN = `${API}/auth/login/`;
const URL_REG   = `${API}/auth/register/`;
const URL_TASKS = `${API}/tasks/`;
// ─────────────────────────────────────

let tasks = [], pendingSubs = [], filterMode = 'all', expanded = new Set();
const token = () => localStorage.getItem('authToken');
const hdrs  = () => ({ 'Content-Type':'application/json', 'Authorization':`Token ${token()}` });

function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function switchTab(t) {
  document.getElementById('loginPanel').classList.toggle('active', t==='login');
  document.getElementById('registerPanel').classList.toggle('active', t==='register');
  document.querySelectorAll('.tab-btns button').forEach((b,i) => b.classList.toggle('active', i===(t==='login'?0:1)));
}
function setLoading(id, on) { const b=document.getElementById(id); b.classList.toggle('loading',on); b.disabled=on; }
function showAlert(id, msg, type='err') { const el=document.getElementById(id); el.textContent=msg; el.className=`alert-msg alert-${type} show`; }
function hideAlert(id) { document.getElementById(id).className='alert-msg'; }

async function doLogin() {
  const username=document.getElementById('lUser').value.trim(), password=document.getElementById('lPass').value;
  if (!username||!password) return showAlert('lErr','Username aur password dono bharo!');
  hideAlert('lErr'); setLoading('lBtn',true);
  try {
    const res=await fetch(URL_LOGIN,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password})});
    const data=await res.json();
    if (res.ok&&data.token) { localStorage.setItem('authToken',data.token); localStorage.setItem('username',username); initApp(); }
    else showAlert('lErr', data.non_field_errors?.[0]||data.detail||'Wrong Username & Password!');
  } catch { showAlert('lErr','Server Not Connect 😔!'); }
  finally { setLoading('lBtn',false); }
}

async function doRegister() {
  const username=document.getElementById('rUser').value.trim(), email=document.getElementById('rEmail').value.trim(), password=document.getElementById('rPass').value;
  if (!username||!password) return showAlert('rErr',' Enter Username & password!');
  hideAlert('rErr'); hideAlert('rOk'); setLoading('rBtn',true);
  try {
    const res=await fetch(URL_REG,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,email,password})});
    const data=await res.json();
    if (res.ok||res.status===201) { showAlert('rOk','Account create succesfully! Now Login! 🎉','ok'); setTimeout(()=>switchTab('login'),1500); }
    else showAlert('rErr', Object.values(data).flat()[0]||'Registration Failed!');
  } catch { showAlert('rErr','Server is Not Connect!'); }
  finally { setLoading('rBtn',false); }
}

function doLogout() {
  localStorage.removeItem('authToken'); localStorage.removeItem('username');
  tasks=[]; pendingSubs=[]; expanded=new Set(); showView('authView');
}

function initApp() {
  document.getElementById('navUser').textContent=localStorage.getItem('username')||'Student';
  showView('appView'); fetchTasks();
}

async function fetchTasks() {
  document.getElementById('loadMsg').style.display='block';
  document.getElementById('taskList').innerHTML='';
  document.getElementById('emptyMsg').style.display='none';
  try {
    const res=await fetch(URL_TASKS,{headers:hdrs()});
    if (res.status===401){doLogout();return;}
    let data=await res.json(); tasks=data.results??data;
  } catch { toast('Tasks load nahi ho sakiin!','err'); tasks=[]; }
  document.getElementById('loadMsg').style.display='none';
  renderAll();
}

function renderAll() { updateStats(); renderTasks(); }
function updateStats() {
  const total=tasks.length, done=tasks.filter(t=>isDone(t)).length;
  document.getElementById('sTotal').textContent=total;
  document.getElementById('sPend').textContent=total-done;
  document.getElementById('sDone').textContent=done;
}
function isDone(t){ return t.status==='done'||!!t.is_completed; }
function setFilter(f,btn){ filterMode=f; document.querySelectorAll('.f-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); renderTasks(); }
function filtered(){ if(filterMode==='pending')return tasks.filter(t=>!isDone(t)); if(filterMode==='done')return tasks.filter(t=>isDone(t)); return tasks; }

function renderTasks() {
  const list=document.getElementById('taskList'), empty=document.getElementById('emptyMsg'), arr=filtered();
  list.innerHTML='';
  if (!arr.length){ empty.style.display='block'; return; }
  empty.style.display='none';
  arr.forEach(task=>{
    const done=isDone(task), subs=task.subtasks||[], subDone=subs.filter(s=>isDone(s)).length;
    const pct=subs.length?Math.round(subDone/subs.length*100):(done?100:0), open=expanded.has(task.id);
    const d=document.createElement('div');
    d.className=`task-card${done?' is-done':''}`;
    d.id=`tc-${task.id}`;
    d.innerHTML=`
      <div class="task-top">
        <div class="t-check${done?' on':''}" onclick="toggleTask(${task.id},${done})"></div>
        <div class="t-info">
          <div class="t-title${done?' done-text':''}">${esc(task.title||task.name||'')}</div>
          <div class="t-meta">
            ${task.subject?`<span class="badge-sub">${esc(task.subject)}</span>`:''}
            ${task.due_date?`<span class="badge-due${isOver(task.due_date)&&!done?' over':''}">${fmtDate(task.due_date)}</span>`:''}
          </div>
        </div>
        <div class="t-actions">
          <button class="t-btn expand" onclick="toggleExpand(${task.id})">${open?'▲':'▼'} ${subs.length||'+'}</button>
          <button class="t-btn" onclick="deleteTask(${task.id})">🗑</button>
        </div>
      </div>
      ${subs.length?`<div class="prog-wrap"><div class="prog-label">${subDone}/${subs.length} subtasks done</div><div class="prog-bg"><div class="prog-fill" style="width:${pct}%"></div></div></div>`:''}
      <div class="sub-area${open?' open':''}" id="sa-${task.id}">
        <h6>Subtasks</h6>
        ${subs.map(s=>subHTML(task.id,s)).join('')}
        <div class="sub-add-row">
          <input type="text" class="form-control" id="si-${task.id}" placeholder="New subtask..."/>
          <button class="btn-plus" onclick="addSubtask(${task.id})">+</button>
        </div>
      </div>`;
    list.appendChild(d);
  });
}

function subHTML(tid,s){ const done=isDone(s); return `<div class="sub-item"><div class="s-check${done?' on':''}" onclick="toggleSub(${tid},${s.id},${done})"></div><div class="s-title${done?' done-text':''}">${esc(s.title||s.name||'')}</div><button class="btn-del-sub" onclick="deleteSub(${tid},${s.id})">✕</button></div>`; }
function toggleExpand(id){ expanded.has(id)?expanded.delete(id):expanded.add(id); renderTasks(); }

function addChip(){ const inp=document.getElementById('subInp'),v=inp.value.trim(); if(!v)return; pendingSubs.push(v); inp.value=''; renderChips(); }
function renderChips(){ document.getElementById('chipsWrap').innerHTML=pendingSubs.map((s,i)=>`<div class="chip">${esc(s)}<button onclick="removeChip(${i})">✕</button></div>`).join(''); }
function removeChip(i){ pendingSubs.splice(i,1); renderChips(); }

async function addTask(){
  const title=document.getElementById('tTitle').value.trim(), subject=document.getElementById('tSubject').value.trim(), due=document.getElementById('tDue').value;
  if(!title){toast('Task ka naam zaroori hai!','err');return;}
  try {
    const res=await fetch(URL_TASKS,{method:'POST',headers:hdrs(),body:JSON.stringify({title,subject,due_date:due||null,status:'pending'})});
    if(!res.ok)throw 0; const created=await res.json();
    for(const st of pendingSubs) await fetch(`${URL_TASKS}${created.id}/subtasks/`,{method:'POST',headers:hdrs(),body:JSON.stringify({title:st})}).catch(()=>{});
    toast('Task add ho gayi! 🎉');
    document.getElementById('tTitle').value=''; document.getElementById('tSubject').value=''; document.getElementById('tDue').value='';
    pendingSubs=[]; renderChips(); fetchTasks();
  } catch { toast('Task save nahi ho sakii!','err'); }
}

async function toggleTask(id,done){
  try {
    const res=await fetch(`${URL_TASKS}${id}/`,{method:'PATCH',headers:hdrs(),body:JSON.stringify({status:done?'pending':'done',is_completed:!done})});
    if(!res.ok)throw 0; const t=tasks.find(t=>t.id===id);
    if(t){t.status=done?'pending':'done';t.is_completed=!done;} renderAll(); toast(done?'Retrun pending':'Task complete! ✅');
  } catch { toast('Update Failed!','err'); }
}

async function deleteTask(id){
  if(!confirm('Delete Task?'))return;
  try { await fetch(`${URL_TASKS}${id}/`,{method:'DELETE',headers:hdrs()}); tasks=tasks.filter(t=>t.id!==id); renderAll(); toast('Task Delete succesfully!'); }
  catch { toast('Delete Failed!','err'); }
}

async function addSubtask(tid){
  const inp=document.getElementById(`si-${tid}`), title=inp.value.trim(); if(!title)return;
  try {
    const res=await fetch(`${URL_TASKS}${tid}/subtasks/`,{method:'POST',headers:hdrs(),body:JSON.stringify({title})});
    if(!res.ok)throw 0; const sub=await res.json();
    const t=tasks.find(t=>t.id===tid); if(t){t.subtasks=t.subtasks||[];t.subtasks.push(sub);}
    expanded.add(tid); renderAll(); toast('Subtask add!');
  } catch { toast('Subtask Not Saved!','err'); }
}

async function toggleSub(tid,sid,done){
  try {
    await fetch(`${URL_TASKS}${tid}/subtasks/${sid}/`,{method:'PATCH',headers:hdrs(),body:JSON.stringify({is_completed:!done,status:done?'pending':'done'})});
    const t=tasks.find(t=>t.id===tid), s=(t?.subtasks||[]).find(s=>s.id===sid);
    if(s){s.is_completed=!done;s.status=done?'pending':'done';} renderAll();
  } catch { toast('Update Failed!','err'); }
}

async function deleteSub(tid,sid){
  try {
    await fetch(`${URL_TASKS}${tid}/subtasks/${sid}/`,{method:'DELETE',headers:hdrs()});
    const t=tasks.find(t=>t.id===tid); if(t)t.subtasks=(t.subtasks||[]).filter(s=>s.id!==sid);
    renderAll(); toast('Subtask Delete!');
  } catch { toast('Delete Failed!','err'); }
}

function toast(msg,type='ok'){ const c=document.getElementById('toastWrap'),el=document.createElement('div'); el.className=`toast-item ${type}`; el.textContent=msg; c.appendChild(el); setTimeout(()=>el.remove(),3000); }
function esc(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
function isOver(d){ return d&&new Date(d)<new Date(new Date().toDateString()); }
function fmtDate(d){ return new Date(d).toLocaleDateString('hi-IN',{day:'numeric',month:'short'}); }

document.addEventListener('keydown',e=>{
  if(e.key!=='Enter')return;
  if(document.getElementById('authView').classList.contains('active')){
    if(document.getElementById('loginPanel').classList.contains('active'))doLogin();
    else doRegister();
  }
});
document.getElementById('subInp').addEventListener('keydown',e=>{ if(e.key==='Enter'){e.preventDefault();addChip();} });

if(token()) initApp();
</script>
</body>
